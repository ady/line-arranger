<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Arranger</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Line Arranger</h1>
  <p class="tagline">Cut-up your stream of consciousness. Drag lines onto the page until something sticks.</p>
</header>

<main>
  <section class="panel" id="inbox-panel">
    <div class="panel-header">
      <h2>Inbox</h2>
      <span class="count" id="inbox-count">0</span>
    </div>

    <div class="add-controls">
      <textarea id="bulk-input" placeholder="Paste lines or words here, one per line&#10;then click Add All"></textarea>
      <div class="add-row">
        <button id="add-bulk-btn">Add All</button>
        <input type="text" id="quick-input" placeholder="...or add one line and hit Enter">
      </div>
    </div>

    <ul class="card-list" id="inbox-list" data-zone="inbox"></ul>
  </section>

  <section class="panel" id="page-panel">
    <div class="panel-header">
      <h2>Page</h2>
      <span class="count" id="page-count">0</span>
    </div>

    <ul class="card-list" id="page-list" data-zone="page"></ul>

    <div class="page-empty-hint" id="page-empty-hint">Drag lines here, or click a card's → to send it to the page.</div>
  </section>
</main>

<footer>
  <div class="footer-group">
    <button id="export-text-btn" title="Download the page as a plain text file">Export poem (.txt)</button>
    <button id="export-json-btn" title="Save inbox + page as a file you can reload later">Save project (.json)</button>
    <label class="file-label" for="import-json-input">Load project</label>
    <input type="file" id="import-json-input" accept="application/json" hidden>
  </div>
  <div class="footer-group">
    <button id="clear-btn" class="danger">Clear everything</button>
  </div>
</footer>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
